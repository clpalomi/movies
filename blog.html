<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movie note — Movies I watched</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F7F8FA;
      --text:#101828;
      --muted:#667085;
      --border:#D0D5DD;
      --accent:#1A56DB;
      --surface:#FFFFFF;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height:1.7;
    }
    .page{
      max-width:760px;
      margin:0 auto;
      padding:32px 20px 56px;
    }
    .back{
      color:var(--accent);
      text-decoration:none;
      font-weight:700;
    }
    .back:hover{ text-decoration:underline; }
    article{
      margin-top:28px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:18px;
      padding:28px;
      box-shadow:0 12px 30px rgba(16,24,40,.08);
    }
    h1{
      font-size:clamp(2rem, 6vw, 4rem);
      line-height:1;
      letter-spacing:-.04em;
      margin:0 0 12px;
    }
    .meta{ color:var(--muted); margin:0 0 22px; }
    .hero{
      width:100%;
      aspect-ratio:16 / 9;
      object-fit:cover;
      border-radius:14px;
      border:1px solid var(--border);
      background:#EEF2FF;
      margin:6px 0 22px;
    }
    .placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      padding:24px;
      text-align:center;
    }
    .body{
      white-space:pre-wrap;
      font-size:1.05rem;
    }
    .empty{
      color:var(--muted);
      font-style:italic;
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="index.html#library">← Back to the movie library</a>
    <article id="entry" aria-live="polite">
      <p class="meta">Loading movie entry…</p>
    </article>
  </main>

  <script>
    const DATA_URL = 'data/movies.json';
    const entry = document.getElementById('entry');

    function escapeHtml(value=''){
      return String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    }

    function slugify(value=''){
      return String(value).toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'movie';
    }

    function normalizeList(value){
      if(Array.isArray(value)) return value;
      if(!value) return [];
      return String(value).split(',').map(item => item.trim()).filter(Boolean);
    }

    function normalizeMovie(movie){
      const title = movie.title || 'Untitled movie';
      const year = Number(movie.year) || null;
      const slug = movie.slug || slugify(`${title} ${year || ''}`);
      return {
        ...movie,
        title,
        year,
        slug,
        director: normalizeList(movie.director),
        poster: movie.poster || '',
        omdb: movie.omdb || null,
        blog: movie.blog && movie.blog.enabled ? {
          enabled: true,
          slug: movie.blog.slug || slug,
          title: movie.blog.title || title,
          body: movie.blog.body || '',
        } : null,
      };
    }

    function paramsSlug(){
      return new URLSearchParams(window.location.search).get('movie') || window.location.hash.replace(/^#/, '');
    }

    function movieDataUrl(movie){
      const imdbId = movie.imdb_id || movie.omdb?.imdbID;
      if(imdbId) return `https://www.imdb.com/title/${encodeURIComponent(imdbId)}/`;
      return `https://www.omdbapi.com/?t=${encodeURIComponent(movie.title)}${movie.year ? `&y=${encodeURIComponent(movie.year)}` : ''}`;
    }
    
    function posterMarkup(movie){
      if(movie.poster){
        return `<img class="hero" src="${escapeHtml(movie.poster)}" alt="Image for ${escapeHtml(movie.title)}" />`;
      }
      return '<div class="hero placeholder">No image has been uploaded for this movie yet.</div>';
    }

    async function render(){
      const slug = paramsSlug();
      const response = await fetch(DATA_URL, { cache:'no-store' });
      if(!response.ok) throw new Error('Could not load movie data');
      const movies = (await response.json()).map(normalizeMovie);
      const movie = movies.find(item => item.blog?.enabled && item.blog.slug === slug);
      if(!movie){
        entry.innerHTML = '<h1>Entry not found</h1><p class="empty">This movie does not have an enabled blog entry yet.</p>';
        return;
      }

      document.title = `${movie.blog.title || movie.title} — Movies I watched`;
      const directors = movie.director.join(', ');
      const body = movie.blog.body || movie.notes || '';
      entry.innerHTML = `
        <h1>${escapeHtml(movie.blog.title || movie.title)}</h1>
        <p class="meta">${movie.year || 'Year unknown'}${directors ? ` · ${escapeHtml(directors)}` : ''}</p>
        ${posterMarkup(movie)}
        <div class="body">${body ? escapeHtml(body) : '<span class="empty">Add text in the optional blog.body field for this movie.</span>'}</div>
        <p class="meta"><a href="${escapeHtml(movieDataUrl(movie))}" target="_blank" rel="noopener">Full movie data</a></p>
      `;
    }

    render().catch(error => {
      console.error(error);
      entry.innerHTML = '<h1>Could not load entry</h1><p class="empty">Run a local web server or check data/movies.json.</p>';
    });
  </script>
</body>
</html>
